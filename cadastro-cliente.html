<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Cliente</title>
  <link rel="stylesheet" href="css/style2.css">
</head>
<body>
  <div class="container">
    <h1>Cadastro de Cliente</h1>
    <form id="formCliente">
      <input type="text" id="nomeCliente" placeholder="Nome Completo" required>
      <input type="email" id="emailCliente" placeholder="Email" required>
      <input type="Senha" id="senhaCliente" placeholder="Senha" required>
      <input type="text" id="enderecoCliente" placeholder="Endereço" required>
      <button type="submit">Cadastrar</button>
    </form>
    <div id="listaClientes"></div>
    <p class="links"><a href="index.html">Página Inicial</a></p>
  </div>
  <script src="js/teste.js"></script>
</body>
</html>
